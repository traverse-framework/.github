# Reusable governance baseline check. Called from each org repo's
# .github/workflows/governance.yml on every pull request.
#
# Verifies the repo carries the required governance artifacts and, when the
# repo vendors the spec-alignment gate, runs it. Repos with no protected
# specs pass automatically (see docs/quality-standards.md).
name: reusable-governance

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  baseline:
    name: governance-baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Required governance files present
        run: |
          set -u
          missing=0
          require() {
            if [ ! -e "$1" ]; then
              echo "::error::missing required governance file: $1 — $2"
              missing=1
            fi
          }
          require ".governance-version" "records which traverse-framework/.github governance release this repo has adopted"
          require ".github/dependabot.yml" "dependency/security updates are a required validation gate"
          if [ ! -e "CLAUDE.md" ] && [ ! -e "AGENTS.md" ]; then
            echo "::error::missing CLAUDE.md or AGENTS.md — required by docs/ai-agent-hardening.md"
            missing=1
          fi
          exit $missing

      - name: Governance version is a known release
        run: |
          v="$(cat .governance-version)"
          echo "adopted governance version: $v"
          case "$v" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "::error::.governance-version must contain a release tag like v1.0.0"; exit 1 ;;
          esac

      # Token-discipline conventions from docs/ai-agent-hardening.md.
      # Warnings only in governance 1.x; blocking in the next major release.
      - name: Agent-doc hygiene (warnings only)
        run: |
          ver="$(cat .governance-version)"
          if [ ! -e ".claudeignore" ]; then
            echo "::warning::no .claudeignore — agents index build artifacts and vendor trees, wasting tokens (docs/ai-agent-hardening.md)"
          fi
          for f in CLAUDE.md AGENTS.md; do
            [ -e "$f" ] || continue
            stale="$(grep -oiE 'governance version v?[0-9]+\.[0-9]+(\.[0-9]+)?' "$f" | head -1 || true)"
            if [ -n "$stale" ] && ! echo "$stale" | grep -q "${ver#v}"; then
              echo "::warning file=$f::hardcoded '$stale' but .governance-version is $ver — never write version numbers in prose, point at .governance-version"
            fi
          done
          # A substantial AGENTS.md is fine when it declares CLAUDE.md canonical
          # (coordination-only content); warn only when neither file defers.
          if [ -e CLAUDE.md ] && [ -e AGENTS.md ]; then
            c=$(wc -c < CLAUDE.md); a=$(wc -c < AGENTS.md)
            if [ "$c" -gt 2000 ] && [ "$a" -gt 2000 ] \
               && ! grep -qiE "canonical.*(CLAUDE|AGENTS)\.md" CLAUDE.md AGENTS.md; then
              echo "::warning::CLAUDE.md (${c}B) and AGENTS.md (${a}B) are both substantial and neither declares the other canonical — one must be canonical, the other a pointer plus tool-specific coordination only (docs/ai-agent-hardening.md)"
            fi
          fi
          if [ -e CLAUDE.md ] && [ "$(wc -c < CLAUDE.md)" -gt 8192 ]; then
            echo "::warning file=CLAUDE.md::over 8KB — this file is loaded into every agent session; keep it under ~6KB (docs/ai-agent-hardening.md)"
          fi
          exit 0

      # The spec-alignment script needs PR context (body file, base/head SHAs)
      # and runs inside each repo's own CI per docs/quality-standards.md, so
      # here we only verify it is wired in — running it again would duplicate
      # the gate without its inputs.
      # Wiring is only required once the repo has approved specs — the gate
      # script itself refuses an empty registry, so a template or brand-new
      # repo cannot wire it yet (see repo-template's README checklist).
      - name: Spec-alignment gate wired into CI (if vendored and specs exist)
        run: |
          if [ ! -e scripts/ci/spec_alignment_check.sh ]; then
            echo "no vendored spec-alignment gate in this repo; skipping"
            exit 0
          fi
          count=0
          if [ -e specs/governance/approved-specs.json ]; then
            count=$(python3 -c "import json; print(len(json.load(open('specs/governance/approved-specs.json')).get('specs', [])))" 2>/dev/null || echo 0)
          fi
          if [ "$count" -eq 0 ]; then
            echo "spec-alignment gate vendored but no approved specs yet; wiring not required until the first spec is approved"
            exit 0
          fi
          if grep -rq "spec_alignment_check.sh" .github/workflows/*.yml .github/workflows/*.yaml 2>/dev/null; then
            echo "spec-alignment gate is vendored and wired into CI ($count approved specs)"
          else
            echo "::error::repo has $count approved specs and vendors scripts/ci/spec_alignment_check.sh, but no workflow in .github/workflows runs it"
            exit 1
          fi
