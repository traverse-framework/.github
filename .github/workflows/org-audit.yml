# Weekly org-wide governance compliance audit.
# Writes the report to the job summary and keeps a single open issue
# ("Governance compliance report") updated when anything is failing.
name: org-audit

on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: org-compliance-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run audit
        id: audit
        env:
          # GITHUB_TOKEN can read public repo contents; ruleset checks need
          # admin read, so set ORG_AUDIT_TOKEN (see docs/owner-setup.md) for
          # full coverage. Falls back to GITHUB_TOKEN.
          GH_TOKEN: ${{ secrets.ORG_AUDIT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set +e
          scripts/org/audit_compliance.sh > report.md
          echo "failed=$?" >> "$GITHUB_OUTPUT"
          cat report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Open or update compliance issue
        if: steps.audit.outputs.failed != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="Governance compliance report"
          existing="$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --search "\"$title\" in:title" --json number --jq '.[0].number')"
          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            gh issue edit "$existing" --repo "$GITHUB_REPOSITORY" --body-file report.md
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" \
              --body "Audit still failing as of $(date -u +%Y-%m-%d). Report updated in the issue body."
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body-file report.md
          fi

      - name: Fail job if non-compliant
        if: steps.audit.outputs.failed != '0'
        run: exit 1
