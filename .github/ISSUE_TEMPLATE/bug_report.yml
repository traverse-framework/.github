name: Bug report
description: Report a runtime, contract, registry, workflow, or demo problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug clearly.
    validations:
      required: true
  - type: input
    id: governing_spec
    attributes:
      label: Governing spec
      description: Reference the governing spec version if known.
      placeholder: specs/001-foundation-v0-1/spec.md
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the steps to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Validation evidence
      description: Include trace ids, logs, screenshots, or failing checks if available.
    validations:
      required: false
  - type: textarea
    id: blocked_by
    attributes:
      label: Blocked by
      description: If work on this bug is blocked, explain why. Otherwise write `not blocked`.
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Definition of done
      description: State the exact fix outcome and completion criteria.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: List the exact commands, checks, or observations that prove the fix.
    validations:
      required: true
